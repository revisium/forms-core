sonar.projectKey=revisium_forms-core
sonar.organization=revisium

sonar.sources=src,scripts,docs,.agents,.github,README.md,AGENTS.md,REVIEW.md,package.json,tsconfig.json,tsdown.config.ts,jest.config.js,eslint.config.mjs
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/__tests__/**,**/__mocks__/**,**/*.spec.ts,package-lock.json

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=docs/**,.agents/**,.github/**,scripts/**,*.config.*,jest.config.js,eslint.config.mjs,src/index.ts

# npm ci is intentional for reproducible CI installs.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=githubactions:S6505
sonar.issue.ignore.multicriteria.e1.resourceKey=.github/workflows/ci.yml
